<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF6B4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dispos">

<title>When are you free?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #EEF3EF;
    --paper: #FFFFFF;
    --ink: #1B2A2E;
    --ink-soft: #5B6B68;
    --line: #DCE4DE;
    --coral: #FF6B4A;
    --coral-dark: #B8431F;
    --coral-soft: #FFD9CC;
    --coral-mid: #FF9D7F;
    --gold: #F4B942;
    --gold-dark: #8A6308;
    --dusk: #5B7FA6;
    --dusk-dark: #2E4A66;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  button, .icon-btn, .cal-cell, .hswitch, .swatch, .segmented button, .member-chip, .hour-row, .group-card, .cat-pick{
    -webkit-user-select: none; user-select: none;
  }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  #app{ max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 0 0 48px; position: relative; }

  h1, h2, h3{ font-family: 'Fraunces', serif; font-weight: 600; margin: 0; color: var(--ink); }

  .screen{ padding: 28px 20px 0; animation: fade .35s ease both; }
  @keyframes fade{ from{ opacity:0; transform: translateY(6px);} to{opacity:1; transform:none;} }

  /* ---------- JOIN / HUB SCREENS ---------- */
  .top-row{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .brand-mark{ width:56px; height:56px; border-radius:16px; background: var(--coral); display:flex; align-items:center; justify-content:center; margin-bottom:18px; transform: rotate(-4deg); }
  .brand-mark svg{ width:28px; height:28px; }
  .lead{ font-size:30px; line-height:1.15; margin-bottom:6px; }
  .sub{ color: var(--ink-soft); font-size:15px; line-height:1.5; margin-bottom:28px; max-width:320px; }
  label.field-label{ display:block; font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin:18px 0 6px; font-weight:600; }
  input.field, textarea.field{ width:100%; padding:13px 14px; font-size:16px; font-family:'Manrope',sans-serif; border:1.5px solid var(--line); border-radius:12px; background:var(--paper); color:var(--ink); outline:none; }
  textarea.field{ resize: vertical; min-height: 70px; line-height:1.4; }
  input.field:focus, textarea.field:focus{ border-color: var(--coral); }
  .btn{ display:flex; align-items:center; justify-content:center; gap:8px; border:none; cursor:pointer; font-family:'Manrope',sans-serif; font-weight:700; font-size:16px; border-radius:12px; padding:14px 20px; transition: transform .12s ease; touch-action: manipulation; }
  .btn:active{ transform: scale(.97); }
  .btn-primary{ background: var(--coral); color:#fff; width:100%; margin-top:26px; }
  .btn-ghost{ background: transparent; color: var(--ink-soft); border:1.5px solid var(--line); }
  .btn-small{ font-size:13px; padding:8px 14px; border-radius:9px; }
  .hint-row{ display:flex; align-items:center; gap:8px; margin-top:10px; font-size:13px; color: var(--ink-soft); }
  .swatches{ display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .swatch{ width:30px; height:30px; border-radius:50%; border:2px solid transparent; cursor:pointer; }
  .swatch.active{ border-color: var(--ink); }

  .back-link{ display:inline-flex; align-items:center; gap:6px; color: var(--ink-soft); font-size:13px; font-weight:600; margin-bottom:16px; cursor:pointer; background:none; border:none; padding:0; font-family:'Manrope',sans-serif; touch-action: manipulation; }

  .cat-picker{ display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .cat-pick{ display:flex; align-items:center; gap:6px; padding:9px 13px; border-radius:11px; border:1.5px solid var(--line); background:var(--paper); font-size:13px; font-weight:700; cursor:pointer; color: var(--ink-soft); touch-action: manipulation; }
  .cat-pick.active{ border-color: var(--ink); color: var(--ink); background: var(--bg); }

  .groups-list{ display:flex; flex-direction:column; gap:10px; margin-top:6px; }
  .group-card{ display:flex; align-items:center; gap:12px; background:var(--paper); border:1.5px solid var(--line); border-radius:14px; padding:14px; cursor:pointer; touch-action: manipulation; }
  .group-card:active{ transform: scale(.98); }
  .group-cat-badge{ width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:19px; flex:0 0 auto; }
  .group-info{ flex:1; min-width:0; }
  .group-title{ font-weight:700; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .group-sub{ font-size:12px; color: var(--ink-soft); margin-top:1px; }
  .group-remove{ width:28px; height:28px; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; flex:0 0 auto; cursor:pointer; touch-action: manipulation; }

  .empty-groups{ text-align:center; padding: 34px 10px; color: var(--ink-soft); font-size:14px; }

  /* ---------- LANGUAGE SWITCHER ---------- */
  .lang-select{ appearance:none; -webkit-appearance:none; font-family:'Manrope',sans-serif; font-weight:700; font-size:12.5px; color:var(--ink); background:var(--paper); border:1.5px solid var(--line); border-radius:10px; padding:8px 26px 8px 10px; cursor:pointer; flex:0 0 auto; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%235B6B68' stroke-width='3'><polyline points='6 9 12 15 18 9'></polyline></svg>"); background-repeat:no-repeat; background-position: right 8px center; }
  .lang-select.icon-btn-style{ width:36px; height:36px; padding:0; text-align:center; text-align-last:center; }

  /* ---------- PLANNER SCREEN ---------- */
  .topbar{ display:flex; align-items:flex-start; justify-content:space-between; padding:22px 20px 14px; gap:10px; }
  .topbar-left{ display:flex; align-items:center; gap:10px; min-width:0; }
  .topbar-badge{ width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:18px; flex:0 0 auto; }
  .room-name{ font-size:19px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .room-code{ font-family:'JetBrains Mono', monospace; font-size:12px; color: var(--ink-soft); margin-top:2px; }
  .icon-btn{ width:36px; height:36px; border-radius:10px; border:1.5px solid var(--line); background: var(--paper); display:flex; align-items:center; justify-content:center; cursor:pointer; flex:0 0 auto; touch-action: manipulation; }
  .icon-btn:active{ transform: scale(.93); }

  .members-row{ display:flex; gap:8px; padding:0 20px 16px; overflow-x:auto; }
  .member-chip{ flex:0 0 auto; display:flex; align-items:center; gap:6px; background: var(--paper); border:1px solid var(--line); border-radius:999px; padding:5px 12px 5px 5px; font-size:13px; font-weight:600; }
  .member-dot{ width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; color:#fff; font-weight:700; flex:0 0 auto; }

  .segmented{ margin:0 20px 18px; display:flex; background: var(--paper); border:1.5px solid var(--line); border-radius:12px; padding:4px; }
  .segmented button{ flex:1; border:none; background:transparent; padding:9px 0; font-family:'Manrope',sans-serif; font-weight:700; font-size:13.5px; color: var(--ink-soft); border-radius:9px; cursor:pointer; }
  .segmented button.active{ background: var(--ink); color:#fff; }

  .notif-banner{ margin:0 20px 16px; background: var(--paper); border:1.5px dashed var(--gold-dark); border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:10px; font-size:13px; }
  .notif-banner button{ flex:0 0 auto; }

  .month-nav{ display:flex; align-items:center; justify-content:space-between; padding: 0 20px 14px; }
  .month-label{ font-size:18px; text-transform:capitalize; }
  .month-nav-controls{ display:flex; gap:8px; align-items:center; }

  .legend{ display:flex; align-items:center; gap:14px; padding:0 20px 12px; font-size:12px; color: var(--ink-soft); flex-wrap:wrap; }
  .legend-item{ display:flex; align-items:center; gap:5px; }
  .legend-swatch{ width:12px; height:12px; border-radius:4px; }

  .cal-wrap{ padding: 0 20px; }
  .cal-weekdays{ display:grid; grid-template-columns: repeat(7,1fr); margin-bottom:6px; }
  .cal-weekdays div{ text-align:center; font-size:11px; color: var(--ink-soft); text-transform:uppercase; letter-spacing:.04em; }
  .cal-grid{ display:grid; grid-template-columns: repeat(7,1fr); gap:5px; }
  .cal-cell{
    position:relative; aspect-ratio: 1; border-radius:10px; background: var(--paper);
    border:1px solid var(--line); cursor:pointer; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:3px; overflow:hidden; touch-action: manipulation;
  }
  .cal-cell.other-month{ opacity:.32; }
  .cal-cell.is-today{ border-color: var(--ink); border-width:1.5px; }
  .cal-cell.full-overlap-day{ box-shadow: 0 0 0 2px var(--gold) inset; }
  .cal-daynum{ font-family:'JetBrains Mono', monospace; font-size:12.5px; font-weight:500; }
  .cal-dots{ display:flex; gap:2px; flex-wrap:wrap; justify-content:center; max-width:34px; }
  .cal-dot{ width:5px; height:5px; border-radius:50%; }
  .cal-bar{ position:absolute; bottom:0; left:0; right:0; height:5px; border-radius:0 0 9px 9px; }
  .cal-note-mark{ position:absolute; top:3px; right:3px; font-size:8px; }
  .cal-reminder-mark{ position:absolute; top:3px; left:3px; width:6px; height:6px; border-radius:50%; background: var(--coral); }

  .bottom-actions{ display:flex; gap:10px; padding:22px 20px 0; }

  /* sheets / overlay */
  .overlay{ position:fixed; inset:0; background: rgba(27,42,46,.45); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
  .sheet{ background: var(--paper); width:100%; max-width:480px; max-height: 84vh; overflow-y:auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; border-radius:20px 20px 0 0; padding:20px 20px calc(24px + env(safe-area-inset-bottom)); animation: rise .25s ease both; }
  @keyframes rise{ from{ transform: translateY(100%);} to{ transform:none; } }
  .sheet-header{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:2px; }
  .sheet-close-x{ width:32px; height:32px; border-radius:50%; background: var(--bg); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; flex:0 0 auto; touch-action: manipulation; -webkit-user-select:none; user-select:none; }
  .sheet h3{ font-size:18px; margin-bottom:2px; text-transform:capitalize; }
  .sheet .sheet-sub{ font-size:13px; color: var(--ink-soft); margin-bottom:14px; }
  .sheet-quick{ display:flex; gap:8px; margin-bottom:14px; }
  .sheet-person{ display:flex; align-items:center; gap:10px; padding:8px 0; font-size:14px; font-weight:600; }
  .sheet-section{ margin-top: 20px; padding-top:16px; border-top:1px solid var(--line); }
  .sheet-section-title{ font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); font-weight:700; margin-bottom:8px; }

  .hour-row{ display:flex; align-items:center; justify-content:space-between; padding:9px 2px; border-bottom:1px solid var(--line); }
  .hour-row:last-child{ border-bottom:none; }
  .hour-row.row-overlap{ background: linear-gradient(90deg, rgba(244,185,66,.12), transparent); border-radius:6px; }
  .hour-time{ font-family:'JetBrains Mono', monospace; font-size:13px; color: var(--ink-soft); width:56px; flex:0 0 auto; }
  .hswitch{ width:42px; height:24px; border-radius:999px; background: var(--line); position:relative; cursor:pointer; flex:0 0 auto; transition: background .15s ease; touch-action: manipulation; }
  .hswitch.on{ background: var(--coral); }
  .hswitch .knob{ position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition: transform .15s ease; }
  .hswitch.on .knob{ transform: translateX(18px); }
  .hour-avatars{ display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; flex:1; }

  .reminder-row{ display:flex; align-items:center; gap:8px; padding:8px 0; font-size:13px; }
  .reminder-time{ font-family:'JetBrains Mono', monospace; font-weight:700; background: var(--bg); border-radius:7px; padding:4px 8px; flex:0 0 auto; }
  .reminder-text{ flex:1; }
  .reminder-del{ width:24px; height:24px; border-radius:50%; background: var(--bg); display:flex; align-items:center; justify-content:center; cursor:pointer; flex:0 0 auto; touch-action: manipulation; }
  .reminder-add-row{ display:flex; gap:8px; margin-top:8px; }
  .reminder-add-row input[type=time]{ width:110px; padding:10px; border:1.5px solid var(--line); border-radius:10px; font-family:'Manrope',sans-serif; font-size:14px; }
  .reminder-add-row input[type=text]{ flex:1; padding:10px; border:1.5px solid var(--line); border-radius:10px; font-family:'Manrope',sans-serif; font-size:14px; }

  .toast{ position:fixed; bottom:18px; left:50%; transform: translateX(-50%); background: var(--ink); color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; z-index:60; opacity:0; transition: opacity .25s ease; max-width:90%; text-align:center; }
  .toast.show{ opacity:1; }

  html[dir="rtl"] .hint-row, html[dir="rtl"] .legend-item, html[dir="rtl"] .member-chip, html[dir="rtl"] .topbar-left, html[dir="rtl"] .sheet-person{ direction: rtl; }

  ::-webkit-scrollbar{ display:none; }
</style>
</head>

function detectLang(){
  try{
    const saved = localStorage.getItem('app-lang');
    if(saved && LANGS.indexOf(saved) !== -1) return saved;
  }catch(e){}
  const nav = ((navigator.language || 'en').split('-')[0] || 'en').toLowerCase();
  return LANGS.indexOf(nav) !== -1 ? nav : 'en';
}

function T(key, vars){
  const dict = I18N[state.lang] || I18N.en;
  let s = (dict[key] !== undefined) ? dict[key] : (I18N.en[key] !== undefined ? I18N.en[key] : key);
  if(vars){
    Object.keys(vars).forEach(k => { s = s.split('{'+k+'}').join(vars[k]); });
  }
  return s;
}

function applyLangToDocument(){
  document.documentElement.lang = state.lang;
  document.documentElement.dir = (state.lang === 'ar') ? 'rtl' : 'ltr';
  document.title = T('join_title');
}

function setLang(lang){
  if(LANGS.indexOf(lang) === -1) return;
  state.lang = lang;
  try{ localStorage.setItem('app-lang', lang); }catch(e){}
  applyLangToDocument();
  render();
}

function buildLangSelectHtml(id){
  return `<select id="${id}" class="lang-select" aria-label="${T('title_language')}">${LANGS.map(l => `<option value="${l}" ${l===state.lang?'selected':''}>${LANG_NAMES[l]}</option>`).join('')}</select>`;
}
function attachLangSelect(id){
  const el = document.getElementById(id);
  if(el) el.onchange = () => setLang(el.value);
}
/* ========================= end i18n ========================= */

function keyFor(name){
  return encodeURIComponent(name.trim().toLowerCase()).replace(/\./g, '%2E');
}

function pad(n){ return n<10 ? '0'+n : ''+n; }
function dstr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function fmtSlot(dateStr, hour){ return dateStr+'_'+hour; }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function colorOf(idx){ return PALETTE[idx % PALETTE.length]; }
function catOf(cat){
  const key = CATEGORIES[cat] ? cat : 'autre';
  const c = CATEGORIES[key];
  return {icon:c.icon, color:c.color, label: T('cat_'+key)};
}
function weekdayLabels(){ return WEEKDAYS_MAP[state.lang] || WEEKDAYS_MAP.en; }
function localeOf(){ return LOCALE_MAP[state.lang] || 'en-US'; }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 1800);
}

async function saveToFirebase(path, data) {
  try {
    const res = await fetch(`${DB_URL}/${path}.json`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    return true;
  } catch (error) {
    console.error("Save error:", error);
    showToast(T('error_save'));
    return false;
  }
}
async function loadFromFirebase(path) {
  try {
    const res = await fetch(`${DB_URL}/${path}.json`);
    if(!res.ok) throw new Error('HTTP '+res.status);
    return await res.json();
  } catch (error) {
    console.error("Load error:", error);
    return null;
  }
}

function loadJoinedGroups(){
  try{
    const raw = localStorage.getItem('joined-groups');
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function saveJoinedGroups(list){
  try{ localStorage.setItem('joined-groups', JSON.stringify(list)); }catch(e){}
}
function upsertJoinedGroup(entry){
  const list = loadJoinedGroups();
  const idx = list.findIndex(g => g.room === entry.room);
  if(idx >= 0) list[idx] = Object.assign({}, list[idx], entry);
  else list.push(entry);
  saveJoinedGroups(list);
}
function removeJoinedGroup(room){
  const list = loadJoinedGroups().filter(g => g.room !== room);
  saveJoinedGroups(list);
}

async function joinRoom(room, name, colorIdx, category, label){
  state.room = room.trim().toLowerCase().replace(/\s+/g,'-');
  state.name = name.trim();
  state.colorIdx = colorIdx;
  state.key = keyFor(state.name);
  state.category = category || 'autre';
  state.label = (label || '').trim();

  const membersObj = await loadFromFirebase(`members/${state.room}`) || {};
  let members = Object.values(membersObj);
  const existing = membersObj[state.key];
  if(!existing){
    await saveToFirebase(`members/${state.room}/${state.key}`, {name: state.name, colorIdx: state.colorIdx});
    members.push({name: state.name, colorIdx: state.colorIdx});
  } else {
    state.colorIdx = existing.colorIdx;
  }
  state.members = members;

  const metaObj = await loadFromFirebase(`meta/${state.room}`);
  if(metaObj && metaObj.label){
    state.label = metaObj.label;
    state.category = metaObj.category || state.category;
  } else if(state.label){
    await saveToFirebase(`meta/${state.room}`, {label: state.label, category: state.category});
  }

  const mineObj = await loadFromFirebase(`avail/${state.room}/${state.key}`) || {};
  state.myAvail = new Set(Object.keys(mineObj));
  state.allAvail[state.name] = new Set(state.myAvail);

  const myNotesObj = await loadFromFirebase(`privateNotes/${state.room}/${state.key}`) || {};
  state.myNotes = myNotesObj;

  const myRemindersObj = await loadFromFirebase(`reminders/${state.room}/${state.key}`) || {};
  state.myReminders = myRemindersObj;

  const groupNotesObj = await loadFromFirebase(`notes/${state.room}`) || {};
  state.groupNotes = groupNotesObj;

  upsertJoinedGroup({room: state.room, name: state.name, colorIdx: state.colorIdx, category: state.category, label: state.label});

  state.screen = 'planner';
  render();
  refreshEverything();
  startPolling();
  startReminderWatch();
}

async function quickJoin(g){
  const appEl = document.getElementById('app');
  if(appEl) appEl.style.opacity = '0.6';
  await joinRoom(g.room, g.name, g.colorIdx, g.category, g.label);
}

async function refreshEverything(){
  const membersObj = await loadFromFirebase(`members/${state.room}`) || {};
  if(Object.keys(membersObj).length) state.members = Object.values(membersObj);

  const allObj = await loadFromFirebase(`avail/${state.room}`) || {};
  const all = {};
  state.members.forEach(m => {
    const k = keyFor(m.name);
    all[m.name] = new Set(Object.keys(allObj[k] || {}));
  });
  state.allAvail = all;

  const groupNotesObj = await loadFromFirebase(`notes/${state.room}`) || {};
  state.groupNotes = groupNotesObj;

  if(state.screen === 'planner' && !state.sheetOpenFor) render();
}

let pollHandle = null;
function startPolling(){
  if(pollHandle) clearInterval(pollHandle);
  pollHandle = setInterval(refreshEverything, 120000);
}

let reminderHandle = null;
function startReminderWatch(){
  if(reminderHandle) clearInterval(reminderHandle);
  checkReminders();
  reminderHandle = setInterval(checkReminders, 20000);
}

function checkReminders(){
  if(state.notifPermission !== 'granted') return;
  const now = new Date();
  const todayStr = dstr(now);
  const nowMinutes = now.getHours()*60 + now.getMinutes();
  Object.keys(state.myReminders).forEach(id => {
    const r = state.myReminders[id];
    if(!r || r.notified) return;
    if(r.dateStr !== todayStr) return;
    const parts = (r.time || '00:00').split(':').map(Number);
    const remMinutes = parts[0]*60 + parts[1];
    if(nowMinutes >= remMinutes && !state.firedReminders.has(id)){
      fireNotification(r);
      state.firedReminders.add(id);
      r.notified = true;
      saveToFirebase(`reminders/${state.room}/${state.key}/${id}`, r);
    }
  });
}

function fireNotification(r){
  try{
    new Notification(T('reminder_notif_title', {label: state.label || state.room}), {
      body: r.text || T('reminder_notif_body')
    });
  }catch(e){ showToast(T('toast_reminder_prefix') + r.text); }
}

async function persistMine(){
  const obj = {};
  state.myAvail.forEach(slot => { obj[slot] = true; });
  await saveToFirebase(`avail/${state.room}/${state.key}`, obj);
  state.allAvail[state.name] = new Set(state.myAvail);
}

function goToHub(){
  if(pollHandle) clearInterval(pollHandle);

  state.screen = 'hub';

  render();
}

function buildMonthGrid(monthDate){
  const year = monthDate.getFullYear(), month = monthDate.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  let startOffset = firstOfMonth.getDay() - 1;
  if(startOffset < 0) startOffset = 6;
  const gridStart = new Date(year, month, 1 - startOffset);
  const cells = [];
  for(let i=0;i<42;i++){
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate()+i);
    cells.push(d);
  }
  while(cells.length > 35){
    const lastRow = cells.slice(cells.length-7);
    if(lastRow.every(d => d.getMonth() !== month)) cells.splice(cells.length-7, 7);
    else break;
  }
  return cells;
}

function myHourCount(dateStr){
  let c = 0;
  HOURS.forEach(h => { if(state.myAvail.has(fmtSlot(dateStr,h))) c++; });
  return c;
}
function membersAvailableAnytime(dateStr){
  return state.members.filter(m => {
    const set = state.allAvail[m.name];
    if(!set) return false;
    return HOURS.some(h => set.has(fmtSlot(dateStr,h)));
  });
}
function hasFullOverlapHour(dateStr){
  if(state.members.length < 2) return false;
  return HOURS.some(h => {
    const slot = fmtSlot(dateStr,h);
    return state.members.every(m => state.allAvail[m.name] && state.allAvail[m.name].has(slot));
  });
}
function hasAnyNote(dateStr){
  return !!(state.groupNotes[dateStr] && state.groupNotes[dateStr].text) || !!state.myNotes[dateStr];
}
function hasReminderToday(dateStr){
  return Object.values(state.myReminders).some(r => r && r.dateStr === dateStr);
}

function buildHourRows(dateStr){
  if(state.view === 'mine'){
    return HOURS.map(h => {
      const slot = fmtSlot(dateStr, h);
      const on = state.myAvail.has(slot);
      return `<div class="hour-row">
        <div class="hour-time">${pad(h)}:00</div>
        <div class="hswitch ${on?'on':''}" data-hour="${h}"><div class="knob"></div></div>
      </div>`;
    }).join('');
  } else {
    return HOURS.map(h => {
      const slot = fmtSlot(dateStr, h);
      const here = state.members.filter(m => state.allAvail[m.name] && state.allAvail[m.name].has(slot));
      const full = state.members.length > 1 && here.length === state.members.length;
      const avatars = here.map(m => `<div class="member-dot" style="background:${colorOf(m.colorIdx).bg}" title="${escapeHtml(m.name)}">${m.name.charAt(0).toUpperCase()}</div>`).join('');
      return `<div class="hour-row ${full?'row-overlap':''}">
        <div class="hour-time">${pad(h)}:00</div>
        <div class="hour-avatars">${avatars || `<span style="font-size:12px; color:var(--ink-soft);">${T('nobody')}</span>`}</div>
      </div>`;
    }).join('');
  }
}

function buildReminderRows(dateStr){
  const entries = Object.keys(state.myReminders)
    .map(id => Object.assign({id}, state.myReminders[id]))
    .filter(r => r.dateStr === dateStr)
    .sort((a,b) => (a.time||'').localeCompare(b.time||''));
  if(!entries.length) return `<div style="font-size:13px; color:var(--ink-soft);">${T('no_reminder_day')}</div>`;
  return entries.map(r => `
    <div class="reminder-row">
      <div class="reminder-time">${escapeHtml(r.time||'')}</div>
      <div class="reminder-text">${escapeHtml(r.text||'')}</div>
      <div class="reminder-del" data-rem-id="${r.id}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#5B6B68" stroke-width="2.4" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </div>
    </div>
  `).join('');
}

function buildSheetHtml(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const dateLabel = d.toLocaleDateString(localeOf(), {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  const groupNoteText = (state.groupNotes[dateStr] && state.groupNotes[dateStr].text) || '';
  const groupNoteAuthor = (state.groupNotes[dateStr] && state.groupNotes[dateStr].authorName) || '';
  const myNoteText = state.myNotes[dateStr] || '';

  return `
    <div class="overlay" id="day-overlay">
      <div class="sheet">
        <div class="sheet-header">
          <div>
            <h3>${dateLabel}</h3>
            <div class="sheet-sub">${state.view==='mine' ? T('sheet_sub_mine') : T('sheet_sub_everyone')}</div>
          </div>
          <button class="sheet-close-x" id="sheet-close-x" aria-label="${T('btn_close')}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1B2A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
        ${state.view==='mine' ? `
          <div class="sheet-quick">
            <button class="btn btn-ghost btn-small" id="btn-day-all" style="flex:1">${T('btn_day_all')}</button>
            <button class="btn btn-ghost btn-small" id="btn-day-none" style="flex:1">${T('btn_day_none')}</button>
          </div>
        ` : ''}
        <div class="hour-list">${buildHourRows(dateStr)}</div>

        <div class="sheet-section">
          <div class="sheet-section-title">${T('group_note_label')}</div>
          <textarea class="field" id="note-group" placeholder="${T('group_note_ph')}">${escapeHtml(groupNoteText)}</textarea>
          ${groupNoteAuthor ? `<div style="font-size:11.5px; color:var(--ink-soft); margin-top:4px;">${T('last_edit_by', {name: escapeHtml(groupNoteAuthor)})}</div>` : ''}
        </div>

        <div class="sheet-section">
          <div class="sheet-section-title">${T('my_note_label')}</div>
          <textarea class="field" id="note-mine" placeholder="${T('my_note_ph')}">${escapeHtml(myNoteText)}</textarea>
        </div>

        <div class="sheet-section">
          <div class="sheet-section-title">${T('my_reminders_label')}</div>
          <div id="reminder-list">${buildReminderRows(dateStr)}</div>
          <div class="reminder-add-row">
            <input type="time" id="rem-time" value="09:00">
            <input type="text" id="rem-text" placeholder="${T('reminder_ph')}">
          </div>
          <button class="btn btn-ghost btn-small" id="btn-add-reminder" style="width:100%; margin-top:8px;">${T('btn_add_reminder')}</button>
          ${state.notifPermission !== 'granted' ? `<div style="font-size:11.5px; color:var(--ink-soft); margin-top:6px;">${T('notif_hint')}</div>` : ''}
        </div>

        <button class="btn btn-ghost" style="width:100%; margin-top:16px;" id="sheet-close">${T('btn_close')}</button>
      </div>
    </div>
  `;
}

function attachSheetInteractions(dateStr){
  const overlay = document.getElementById('day-overlay');
  if(!overlay) return;

  overlay.onclick = (e) => { if(e.target === overlay) closeSheet(); };
  const closeBtn = document.getElementById('sheet-close');
  const closeX = document.getElementById('sheet-close-x');
  if(closeBtn) closeBtn.onclick = closeSheet;
  if(closeX) closeX.onclick = closeSheet;

  const allBtn = document.getElementById('btn-day-all');
  const noneBtn = document.getElementById('btn-day-none');
  if(allBtn) allBtn.onclick = () => {
    HOURS.forEach(h => state.myAvail.add(fmtSlot(dateStr,h)));
    schedulePersist();
    render();
  };
  if(noneBtn) noneBtn.onclick = () => {
    HOURS.forEach(h => state.myAvail.delete(fmtSlot(dateStr,h)));
    schedulePersist();
    render();
  };

  if(state.view === 'mine'){
    document.querySelectorAll('.hswitch').forEach(sw => {
      sw.onclick = () => {
        const h = parseInt(sw.dataset.hour, 10);
        const slot = fmtSlot(dateStr, h);
        const turnOn = !state.myAvail.has(slot);
        if(turnOn) state.myAvail.add(slot); else state.myAvail.delete(slot);
        sw.classList.toggle('on', turnOn);
        schedulePersist();
      };
    });
  }

  const noteGroupEl = document.getElementById('note-group');
  const noteMineEl = document.getElementById('note-mine');
  if(noteGroupEl){
    noteGroupEl.oninput = () => scheduleNoteSave(dateStr, 'group', noteGroupEl.value);
  }
  if(noteMineEl){
    noteMineEl.oninput = () => scheduleNoteSave(dateStr, 'mine', noteMineEl.value);
  }

  const addRemBtn = document.getElementById('btn-add-reminder');
  if(addRemBtn){
    addRemBtn.onclick = async () => {
      const timeVal = document.getElementById('rem-time').value || '09:00';
      const textVal = document.getElementById('rem-text').value.trim();
      if(!textVal){ showToast(T('toast_add_reminder_text')); return; }
      const id = 'r' + Date.now() + Math.floor(Math.random()*1000);
      const entry = {dateStr, time: timeVal, text: textVal, notified:false};
      state.myReminders[id] = entry;
      await saveToFirebase(`reminders/${state.room}/${state.key}/${id}`, entry);
      document.getElementById('rem-text').value = '';
      document.getElementById('reminder-list').innerHTML = buildReminderRows(dateStr);
      attachReminderDeleteHandlers(dateStr);
      render();
    };
  }
  attachReminderDeleteHandlers(dateStr);
}

function attachReminderDeleteHandlers(dateStr){
  document.querySelectorAll('.reminder-del').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.remId;
      delete state.myReminders[id];
      await saveToFirebase(`reminders/${state.room}/${state.key}/${id}`, null);
      const list = document.getElementById('reminder-list');
      if(list) list.innerHTML = buildReminderRows(dateStr);
      attachReminderDeleteHandlers(dateStr);
      render();
    };
  });
}

let persistTimer = null;
function schedulePersist(){
  if(persistTimer) clearTimeout(persistTimer);
  persistTimer = setTimeout(() => { persistMine(); }, 400);
}

let noteTimer = null;
function scheduleNoteSave(dateStr, which, value){
  if(noteTimer) clearTimeout(noteTimer);
  noteTimer = setTimeout(async () => {
    if(which === 'group'){
      const entry = {text: value, authorName: state.name};
      state.groupNotes[dateStr] = entry;
      await saveToFirebase(`notes/${state.room}/${dateStr}`, value ? entry : null);
    } else {
      state.myNotes[dateStr] = value;
      await saveToFirebase(`privateNotes/${state.room}/${state.key}/${dateStr}`, value || null);
    }
  }, 500);
}

function openDaySheet(dateStr){
  state.sheetOpenFor = dateStr;
  render();
}
function closeSheet(){
  state.sheetOpenFor = null;
  render();
}

function render(){
  if(state.screen === 'hub') renderHub();
  else if(state.screen === 'join') renderJoin();
  else renderPlanner();
}

applyLangToDocument();
const initialGroups = loadJoinedGroups();
state.screen = initialGroups.length ? 'hub' : 'join';
render();
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
